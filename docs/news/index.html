<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آخر أخبار الرياضة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #141414;
            --surface: #181818;
            --primary: #E50914;
            --hover: #FFFFFF;
            --text-main: #FFFFFF;
            --text-secondary: #B3B3B3;
            --border: #212121;
            --white: #FFFFFF;
            --shadow: 0 8px 30px rgba(0,0,0,0.8);
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        /* Header */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo::before {
            content: '⚽';
        }

        nav ul {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav a {
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 1rem;
        }

        nav a:hover, nav a.active {
            color: var(--primary);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Footer */
        footer {
            background: var(--surface);
            padding: 3rem 5%;
            text-align: center;
            margin-top: 5rem;
            border-top: 1px solid var(--border);
        }

        .footer-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .footer-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            font-weight: 800;
            background: var(--primary);
            color: var(--white);
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            background: var(--hover);
            color: var(--bg);
        }

        .team-logo-img {
            width: 54px;
            height: 54px;
            object-fit: contain;
            background: #f9f9f9;
            padding: 5px;
            border-radius: 50%;
            border: 2px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .team-logo-small {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 50%;
        }

        .btn-watch {
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-top: 5px;
            transition: var(--transition);
        }

        .btn-watch:hover {
            background: var(--hover);
            color: var(--bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 42, 95, 0.4);
        }

        
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">CupLive</a>
        <nav>
            <ul>
                <li><a href="/">الرئيسية</a></li>
                <li><a href="/matches/">المباريات</a></li>
                <li><a href="/news/">الأخبار</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        
<header style="margin-bottom: 3rem; text-align: center;">
    <h1 style="font-size: 2.5rem; font-weight: 800; color: var(--primary);">أخبار الرياضة العالمية</h1>
    <p style="color: var(--text-secondary);">تغطية شاملة لأهم الأحداث والتقارير الرياضية على مدار الساعة</p>
</header>

<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem;">
    
</div>

    </main>

    <footer>
        <div class="footer-logo">CupLive</div>
        <p class="footer-text">© 2026 جميع الحقوق محفوظة. البوابة الأولى للبث المباشر والأخبار الرياضية.</p>
    </footer>

    
</body>
</html>
