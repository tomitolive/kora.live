<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر جيرونا و فياريال</title>
    <style>
        :root {
            --primary: #0A5C2A;
            --bg: #000000;
            --surface: #1a1a1a;
            --text: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }
        .player-header {
            background: var(--surface);
            padding: 10px 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #333;
        }
        .server-btn {
            background: #333;
            color: #ccc;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 800;
            white-space: nowrap;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .server-btn:hover {
            background: #444;
            color: #fff;
        }
        .server-btn.active {
            background: var(--primary);
            color: #fff;
        }
        #main-iframe {
            width: 100%;
            height: calc(100vh - 55px);
            border: none;
            background: #000;
        }
        /* Pulse for Live indicator */
        .live-dot {
            height: 8px;
            width: 8px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    
    <div class="player-header">
        
        <button class="server-btn active" onclick="changeServer('https://9live.kooraxx.com/albaplayer/bein-2/?serv=1', this)">
            بث رئيسي
        </button>
        
        <button class="server-btn " onclick="changeServer('https://9live.kooraxx.com/albaplayer/bein-2/?serv=2', this)">
            جوال
        </button>
        
        <button class="server-btn " onclick="changeServer('https://9live.kooraxx.com/albaplayer/bein-2/?serv=3', this)">
            English
        </button>
        
        <button class="server-btn " onclick="changeServer('https://9live.kooraxx.com/albaplayer/bein-2/?serv=4', this)">
            French
        </button>
        
        <button class="server-btn " onclick="changeServer('javascript:window.location.reload()', this)">
            سيرفر 5
        </button>
        
        <div style="margin-right: auto; display: flex; align-items: center; font-size: 0.8rem; font-weight: 700; color: #aaa;">
             <span class="live-dot"></span> مباشر الآن
        </div>
    </div>
    
    <div style="background: #222; padding: 5px 15px; font-size: 0.8rem; color: #f1c40f; text-align: center; border-bottom: 1px solid #444;">
        ⚠️ إذا لم يظهر البث، اضغط على السيرفر مرة أخرى أو استخدم زر "فتح في نافذة جديدة"
    </div>

    <div id="player-container" style="position: relative; width: 100%; height: calc(100vh - 55px); background: #000;">
        <div id="video-wrapper" style="display: none; width: 100%; height: 100%;">
            <video id="video-player" controls style="width: 100%; height: 100%;"></video>
        </div>
        <iframe id="main-iframe" src="" allowfullscreen referrerpolicy="no-referrer" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>

    <div style="position: absolute; bottom: 20px; right: 20px; z-index: 100;">
        <a id="external-link" href="#" target="_blank" class="server-btn" style="background: #e74c3c; text-decoration: none;">فتح في نافذة جديدة ↗️</a>
    </div>
    

    <script>
        var hls = null;
        function changeServer(url, btn) {
            const iframe = document.getElementById('main-iframe');
            const videoWrapper = document.getElementById('video-wrapper');
            const video = document.getElementById('video-player');
            const extLink = document.getElementById('external-link');
            
            if (extLink) extLink.href = url;
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            if (url.includes('.m3u8') || url.includes('.mp4') || url.includes('.mpd')) {
                iframe.style.display = 'none';
                iframe.src = 'about:blank';
                videoWrapper.style.display = 'block';
                
                if (Hls.isSupported()) {
                    if (hls) hls.destroy();
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.play();
                }
            } else {
                if (hls) { hls.destroy(); hls = null; }
                videoWrapper.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = url;
            }
        }

        window.onload = function() {
            
            changeServer('https://9live.kooraxx.com/albaplayer/bein-2/?serv=1', document.querySelector('.server-btn'));
            
        };
    </script>
</body>
</html>
