<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر جيرونا و فياريال</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0A5C2A;
            --primary-glow: rgba(10, 92, 42, 0.4);
            --bg: #0a0a0a;
            --surface: #141414;
            --surface2: #1e1e1e;
            --text: #ffffff;
            --muted: #888;
            --red: #e74c3c;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .match-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .match-title {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #fff 30%, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .match-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: var(--muted);
            font-size: 0.9rem;
        }
        .live-badge {
            background: var(--red);
            color: #fff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            animation: pulse-badge 2s infinite;
        }
        .live-dot {
            width: 7px; height: 7px;
            background: #fff;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
        @keyframes pulse-badge { 0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,0.4)} 50%{box-shadow:0 0 0 8px rgba(231,76,60,0)} }

        .servers-section {
            width: 100%;
            max-width: 680px;
        }
        .section-title {
            font-size: 0.85rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            text-align: center;
        }
        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.75rem;
        }
        .server-btn {
            background: var(--surface2);
            border: 1px solid #2a2a2a;
            color: #ccc;
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .server-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
        }
        .server-btn .icon { font-size: 1.2rem; }

        .no-servers {
            text-align: center;
            padding: 3rem 1rem;
        }
        .no-servers .emoji { font-size: 4rem; margin-bottom: 1rem; }
        .no-servers h2 { font-size: 1.4rem; font-weight: 900; margin-bottom: 0.5rem; }
        .no-servers p { color: var(--muted); font-size: 1rem; max-width: 400px; margin: 0 auto 1.5rem; }

        .back-link {
            margin-top: 2.5rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="match-header">
        <div class="match-title">جيرونا 🆚 فياريال</div>
        <div class="match-meta">
            <span>الدوري الإسباني</span>
            <span>•</span>
            <span class="live-badge"><span class="live-dot"></span> مباشر الآن</span>
        </div>
    </div>

    <div class="servers-section">
        
        <div class="no-servers">
            <div class="emoji">🕒</div>
            <h2>البث سيبدأ قريباً</h2>
            <p>سنوفر سيرفرات المشاهدة لمباراة جيرونا و فياريال قريباً. حدّث الصفحة عند اقتراب موعد المباراة.</p>
            <a href="../../index.html" class="server-btn" style="max-width: 200px; margin: 0 auto; text-decoration: none;">العودة للرئيسية</a>
        </div>
        
    </div>

    <a href="../../index.html" class="back-link">← العودة للرئيسية</a>

</body>
</html>
