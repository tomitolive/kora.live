<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر نابولي و ميلان</title>
    <style>
        :root {
            --primary: #0A5C2A;
            --bg: #000000;
            --surface: #1a1a1a;
            --text: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }
        .player-header {
            background: var(--surface);
            padding: 10px 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #333;
        }
        .server-btn {
            background: #333;
            color: #ccc;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 800;
            white-space: nowrap;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .server-btn:hover {
            background: #444;
            color: #fff;
        }
        .server-btn.active {
            background: var(--primary);
            color: #fff;
        }
        #main-iframe {
            width: 100%;
            height: calc(100vh - 55px);
            border: none;
            background: #000;
        }
        /* Pulse for Live indicator */
        .live-dot {
            height: 8px;
            width: 8px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body>
    <div class="player-header">
        
        <button class="server-btn active" onclick="changeServer('https://9live.kooraxx.com/albaplayer/pemium-1/?serv=1', this)">
            بث رئيسي
        </button>
        
        <button class="server-btn " onclick="changeServer('https://9live.kooraxx.com/albaplayer/pemium-1/?serv=2', this)">
            Italy
        </button>
        
        <button class="server-btn " onclick="changeServer('https://9live.kooraxx.com/albaplayer/pemium-1/?serv=3', this)">
            English
        </button>
        
        <button class="server-btn " onclick="changeServer('javascript:window.location.reload()', this)">
            سيرفر 4
        </button>
        
        <div style="margin-right: auto; display: flex; align-items: center; font-size: 0.8rem; font-weight: 700; color: #aaa;">
             <span class="live-dot"></span> مباشر الآن
        </div>
    </div>
    
    <iframe id="main-iframe" src="https://9live.kooraxx.com/albaplayer/pemium-1/?serv=1" allowfullscreen></iframe>

    <script>
        function changeServer(url, btn) {
            document.getElementById('main-iframe').src = url;
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        // Auto-refresh logic handled by parent match.html but can be added here too if needed
    </script>
</body>
</html>
