<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر ألافيس و أوساسونا</title>
    <style>
        :root {
            --primary: #0A5C2A;
            --bg: #000000;
            --surface: #1a1a1a;
            --text: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }
        .player-header {
            background: var(--surface);
            padding: 10px 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #333;
        }
        .server-btn {
            background: #333;
            color: #ccc;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 800;
            white-space: nowrap;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .server-btn:hover {
            background: #444;
            color: #fff;
        }
        .server-btn.active {
            background: var(--primary);
            color: #fff;
        }
        #main-iframe {
            width: 100%;
            height: calc(100vh - 55px);
            border: none;
            background: #000;
        }
        /* Pulse for Live indicator */
        .live-dot {
            height: 8px;
            width: 8px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body>
    
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 2rem;">
        <div style="font-size: 5rem; margin-bottom: 2rem;">🕒</div>
        <h1 style="font-weight: 900; color: var(--primary); margin-bottom: 1rem;">البث المباشر سيبدأ قريباً</h1>
        <p style="font-size: 1.2rem; color: #aaa; max-width: 600px;">سنقوم بتوفير سيرفرات المشاهدة لمباراة ألافيس و أوساسونا فور توفرها. يرجى تحديث الصفحة عند اقتراب موعد المباراة.</p>
        <a href="../../index.html" class="server-btn" style="margin-top: 2rem; text-decoration: none;">العودة للرئيسية</a>
    </div>
    

    <script>
        function changeServer(url, btn) {
            document.getElementById('main-iframe').src = url;
            document.getElementById('external-link').href = url;
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        // Auto-refresh logic handled by parent match.html but can be added here too if needed
    </script>
</body>
</html>
