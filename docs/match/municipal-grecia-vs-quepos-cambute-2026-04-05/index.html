<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Municipal Grecia ضد Quepos Cambute</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F5F5F5;
            --primary: #0A5C2A;
            --hover: #1a7a3a;
            --text-main: #111111;
            --text-secondary: #555555;
            --border: #E0E0E0;
            --white: #FFFFFF;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --transition: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        /* Header */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo::before {
            content: '⚽';
        }

        nav ul {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav a {
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 1rem;
        }

        nav a:hover, nav a.active {
            color: var(--primary);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Footer */
        footer {
            background: var(--surface);
            padding: 3rem 5%;
            text-align: center;
            margin-top: 5rem;
            border-top: 1px solid var(--border);
        }

        .footer-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .footer-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            font-weight: 700;
            background: var(--primary);
            color: var(--white);
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            background: var(--hover);
        }

        
    .match-header {
        background: var(--primary);
        color: var(--white);
        padding: 3rem 1rem;
        border-radius: 12px;
        text-align: center;
        margin-bottom: 2rem;
    }

    .teams {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 3rem;
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 1.5rem;
    }

    .vs {
        opacity: 0.7;
        font-size: 1.5rem;
    }

    .match-meta {
        font-size: 1.1rem;
        opacity: 0.9;
        display: flex;
        justify-content: center;
        gap: 2rem;
    }

    .player-container {
        position: relative;
        padding-bottom: 56.25%; /* 16:9 */
        height: 0;
        overflow: hidden;
        border-radius: 10px;
        background: #000;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
    }

    .player-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
    }

    .server-selector {
        display: flex;
        gap: 0.8rem;
        margin-bottom: 1rem;
        overflow-x: auto;
        padding-bottom: 0.5rem;
    }

    .server-btn {
        padding: 0.5rem 1.2rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
    }

    .server-btn.active {
        background: var(--primary);
        color: var(--white);
        border-color: var(--primary);
    }

    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">CupLive</a>
        <nav>
            <ul>
                <li><a href="/">الرئيسية</a></li>
                <li><a href="/matches/">المباريات</a></li>
                <li><a href="/news/">الأخبار</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        
    <div class="match-card">
        <div class="match-header">
            <span class="league-tag">Liga de Ascenso</span>
            <span style="font-weight: 700; color: var(--text-main);">00:00</span>
        </div>
        
        <div class="match-teams">
            <div class="team">
                <div class="team-logo">M</div>
                <div class="team-name">Municipal Grecia</div>
            </div>
            <div class="vs">VS</div>
            <div class="team">
                <div class="team-logo">Q</div>
                <div class="team-name">Quepos Cambute</div>
            </div>
        </div>

        
        <div style="text-align: center; margin-top: 2rem;">
            <a href="/match/municipal-grecia-vs-quepos-cambute-2026-04-05/watch.html" class="watch-btn" style="display: inline-block; background: var(--primary); color: white; padding: 1.2rem 3rem; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(10, 92, 42, 0.3); transition: var(--transition);">
                إضغط هنا لمشاهدة المباراة بث مباشر 📺
            </a>
            <p style="margin-top: 1rem; color: var(--text-muted); font-weight: 600;">بث مباشر بجودة عالية - اختيار السيرفر متاح في صفحة المشاهدة</p>
        </div>
        
    </div>

    </main>

    <footer>
        <div class="footer-logo">CupLive</div>
        <p class="footer-text">© 2026 جميع الحقوق محفوظة. البوابة الأولى للبث المباشر والأخبار الرياضية.</p>
    </footer>

    
<script>
    function changeSource(url, btn) {
        document.getElementById('mainPlayer').src = url;
        const buttons = document.querySelectorAll('.server-btn');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>

</body>
</html>
